<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RewardKu - Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.2)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 30px rgba(251, 191, 36, 0.6)); }
        }
        .coin-glow { animation: pulse-glow 3s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased selection:bg-amber-500 selection:text-slate-950">

    <div class="max-w-md mx-auto min-h-screen flex flex-col justify-between p-4 pb-24 relative">
        
        <header class="bg-slate-900/80 backdrop-blur-md p-4 rounded-2xl shadow-2xl flex justify-between items-center mb-3 border border-slate-800">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <h1 class="text-xl font-black tracking-wider bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent">REWARDKU</h1>
                    <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse" title="Server Online"></span>
                </div>
                <p id="user-phone" class="text-xs text-slate-400 font-mono mt-0.5">ID: Memuat...</p>
            </div>
            <div class="bg-slate-950/80 px-4 py-2 rounded-xl border border-amber-500/20 flex items-center gap-2 shadow-inner">
                <span class="text-xl animate-spin-slow">🪙</span>
                <span id="user-coins" class="font-black text-amber-400 text-lg tracking-wide">0</span>
            </div>
        </header>

        <div class="bg-slate-900 px-3 py-1.5 rounded-lg text-[11px] text-slate-400 mb-4 overflow-hidden border border-slate-800 flex items-center gap-2">
            <span class="text-amber-500 font-bold shrink-0">📢 LIVE:</span>
            <marquee class="w-full">0852***9129 berhasil menarik Rp 10.000 (Dana) • 0813***0041 berhasil menarik Rp 25.000 (Ovo) • 0878***3321 menukarkan 5.000 koin • </marquee>
        </div>

        <div class="w-full flex justify-center mb-4 min-h-[50px]">
            <script>
              atOptions = {
                'key' : 'e09b85ce63c196e932ec644f78690a61',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
              };
            </script>
            <script src="https://revolthem.com/e09b85ce63c196e932ec644f78690a61/invoke.js"></script>
        </div>

        <main class="flex-grow flex flex-col items-center justify-center my-auto py-4">
            <button id="click-btn" class="coin-glow w-44 h-44 bg-gradient-to-b from-amber-400 via-amber-500 to-orange-600 rounded-full shadow-[0_0_50px_rgba(245,158,11,0.15)] flex items-center justify-center border-[6px] border-amber-300/90 active:scale-95 transition-all duration-75 focus:outline-none cursor-pointer">
                <span class="text-7xl select-none drop-shadow-[0_4px_6px_rgba(0,0,0,0.4)]">🪙</span>
            </button>
        </main>

        <div class="w-full flex justify-center mt-4 overflow-hidden min-h-[60px]">
            <div class="max-w-full transform scale-90 origin-center">
                <script>
                  atOptions = {
                    'key' : '248658b5ecde7db9470724760291795c',
                    'format' : 'iframe',
                    'height' : 60,
                    'width' : 468,
                    'params' : {}
                  };
                </script>
                <script src="https://revolthem.com/248658b5ecde7db9470724760291795c/invoke.js"></script>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900/90 backdrop-blur-lg border-t border-slate-800 p-3 flex justify-around items-center rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.5)] z-40">
            <button onclick="switchTab('game')" class="flex flex-col items-center text-amber-400 font-bold text-xs gap-1">
                <span class="text-xl">🎮</span> Beranda
            </button>
            <button onclick="openWdModal()" class="flex flex-col items-center text-slate-400 hover:text-amber-400 font-medium text-xs gap-1 transition-colors">
                <span class="text-xl">💸</span> Tarik Saldo
            </button>
        </nav>

    </div>

    <div id="wd-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl w-full max-w-xs p-6 relative shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-black bg-gradient-to-r from-amber-400 to-amber-500 bg-clip-text text-transparent">Penarikan Dana</h2>
                <button onclick="closeWdModal()" class="text-slate-500 hover:text-white text-sm font-mono p-1">✕</button>
            </div>
            
            <div class="space-y-3">
                <div>
                    <label class="text-[11px] text-slate-400 block mb-1 font-medium">Jumlah Koin (Min. 1.000)</label>
                    <input type="number" id="wd-amount" placeholder="Contoh: 1000" class="w-full p-3 rounded-xl bg-slate-950 border border-slate-800 text-white placeholder-slate-600 text-sm focus:border-amber-500 focus:ring-1 focus:ring-amber-500 focus:outline-none font-mono">
                </div>
                <div>
                    <label class="text-[11px] text-slate-400 block mb-1 font-medium">Nomor Tujuan E-Wallet</label>
                    <input type="text" id="wd-target" placeholder="Nomor DANA / OVO / GOPAY" class="w-full p-3 rounded-xl bg-slate-950 border border-slate-800 text-white placeholder-slate-600 text-sm focus:border-amber-500 focus:ring-1 focus:ring-amber-500 focus:outline-none font-mono">
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="closeWdModal()" class="w-1/2 py-3 bg-slate-800 text-slate-300 font-bold text-xs rounded-xl hover:bg-slate-700 active:scale-95 transition-all">BATAL</button>
                <button onclick="prosesWithdraw()" class="w-1/2 py-3 bg-gradient-to-r from-amber-500 to-orange-600 text-white font-black text-xs rounded-xl hover:from-amber-400 hover:to-orange-500 active:scale-95 transition-all shadow-lg shadow-orange-600/20 tracking-wider">KIRIM WD</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://solving-qld-continued-agriculture.trycloudflare.com";
        const SMART_LINK = "https://revolthem.com/udr4xrzxjb?key=703d7547dbc4d6638c791caf7d7f1cd8";
        
        let userPhone = "081234567890"; // Simulasi ID Pengguna aktif
        let currentCoins = 0;

        document.getElementById('user-phone').innerText = `ID: ${userPhone}`;
        const coinsDisplay = document.getElementById('user-coins');
        const clickBtn = document.getElementById('click-btn');

        // Sinkronisasi data awal ke cloud database Supabase via Termux
        async function fetchUserData() {
            try {
                const response = await fetch(`${API_URL}/api/user/${userPhone}`);
                if (response.ok) {
                    const data = await response.json();
                    currentCoins = data.coins || 0;
                    coinsDisplay.innerText = currentCoins.toLocaleString('id-ID');
                }
            } catch (err) {
                console.error("Gagal sinkronisasi data server:", err);
            }
        }

        // Aksi Ketuk Koin (+1 Koin)
        clickBtn.addEventListener('click', async () => {
            currentCoins += 1;
            coinsDisplay.innerText = currentCoins.toLocaleString('id-ID');

            try {
                await fetch(`${API_URL}/api/click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: userPhone })
                });
            } catch (err) {
                console.error("Gagal mengamankan data klik:", err);
            }
        });

        function openWdModal() { document.getElementById('wd-modal').classList.remove('hidden'); }
        function closeWdModal() { document.getElementById('wd-modal').classList.add('hidden'); }

        // Eksekusi WD + Trik Cuan Ganda Smart Link
        async function prosesWithdraw() {
            const amount = parseInt(document.getElementById('wd-amount').value);
            const target = document.getElementById('wd-target').value;

            if (!amount || !target) {
                alert("Harap lengkapi semua kolom penarikan!");
                return;
            }
            if (amount > currentCoins) {
                alert("Koin Anda tidak mencukupi!");
                return;
            }
            if (amount < 1000) {
                alert("Minimal penarikan adalah 1.000 koin!");
                return;
            }

            // [STRATEGI CUAN 200%] Buka Smart Link Adsterra di tab baru sebelum memproses data backend
            window.open(SMART_LINK, '_blank');

            try {
                const response = await fetch(`${API_URL}/api/withdraw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: userPhone, amount: amount, target: target })
                });

                if (response.ok) {
                    alert("Permintaan penarikan Anda berhasil dijadwalkan! Mohon tunggu proses validasi admin.");
                    currentCoins -= amount;
                    coinsDisplay.innerText = currentCoins.toLocaleString('id-ID');
                    closeWdModal();
                } else {
                    const resData = await response.json();
                    alert("Penarikan gagal: " + resData.message);
                }
            } catch (err) {
                alert("Gangguan koneksi, silakan coba beberapa saat lagi.");
                console.error(err);
            }
        }

        // Nyalakan sistem otomatis saat halaman aktif
        fetchUserData();
    </script>
</body>
</html>
